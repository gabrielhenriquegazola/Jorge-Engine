<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#05070b;
color:#ffffff;
line-height:1.5;
}

.container{
width:100%;
max-width:1180px;
margin:auto;
padding:0 24px;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:100;
background:rgba(5,7,11,.90);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.06);
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 0;
}

/* LOGO CLICÁVEL */
.logo{
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:800;
text-decoration:none;
color:#ffffff;
cursor:pointer;
transition:.2s;
}

.logo:hover{
opacity:.92;
transform:translateY(-1px);
}

.logo img{
height:38px;
width:auto;
display:block;
}

.nav-links{
display:flex;
gap:18px;
align-items:center;
flex-wrap:wrap;
}

.nav-links a{
color:#dbe5f0;
text-decoration:none;
font-size:14px;
transition:.2s;
}

.nav-links a:hover{
color:#ffffff;
}

/* HERO */
.hero{
padding:95px 0 72px;
text-align:center;
background:
radial-gradient(circle at top, rgba(39,194,255,.18), transparent 42%),
linear-gradient(180deg,#05070b 0%,#07111d 100%);
}

.badge{
display:inline-block;
padding:8px 14px;
border:1px solid rgba(255,255,255,.10);
border-radius:999px;
font-size:13px;
color:#a9c5e8;
margin-bottom:24px;
background:rgba(255,255,255,.03);
}

.hero h1{
font-size:64px;
font-weight:900;
line-height:1.05;
margin-bottom:18px;
}

.hero p{
max-width:920px;
margin:0 auto 18px;
font-size:24px;
color:#d8e2ee;
}

.hero .sub{
font-size:18px;
color:#91a8c6;
max-width:860px;
margin-bottom:34px;
}

.cta{
display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
margin-bottom:34px;
}

.btn{
padding:14px 24px;
border-radius:10px;
text-decoration:none;
font-weight:800;
font-size:15px;
transition:.2s;
display:inline-block;
}

.btn-primary{
background:#27c2ff;
color:#03131f;
}

.btn-primary:hover{
transform:translateY(-2px);
background:#55d1ff;
}

.btn-secondary{
border:1px solid rgba(255,255,255,.14);
color:#ffffff;
background:rgba(255,255,255,.03);
}

.btn-secondary:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.07);
}

.metrics{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
margin-top:18px;
}

.metric{
padding:18px;
border-radius:14px;
background:#0b1320;
border:1px solid rgba(255,255,255,.06);
}

.metric strong{
display:block;
font-size:24px;
margin-bottom:6px;
}

.metric span{
font-size:14px;
color:#8fa4c0;
}

/* SECTIONS */
section{
padding:78px 0;
}

.section-title{
font-size:38px;
text-align:center;
margin-bottom:14px;
}

.section-sub{
text-align:center;
max-width:820px;
margin:0 auto 44px;
color:#9db0c7;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card{
display:block;
text-decoration:none;
background:#0b1320;
border:1px solid rgba(255,255,255,.06);
border-radius:16px;
padding:26px;
transition:.2s;
color:#ffffff;
}

.card:hover{
transform:translateY(-5px);
border-color:rgba(39,194,255,.35);
}

.card h3{
font-size:22px;
margin-bottom:10px;
}

.card p{
color:#9db0c7;
font-size:15px;
}

.card small{
display:inline-block;
margin-top:14px;
color:#27c2ff;
font-weight:700;
}

/* BAND */
.band{
background:linear-gradient(90deg,#0b1320,#101c2d);
border-top:1px solid rgba(255,255,255,.05);
border-bottom:1px solid rgba(255,255,255,.05);
}

.band-inner{
padding:56px 0;
text-align:center;
}

.band-inner h2{
font-size:36px;
margin-bottom:12px;
}

.band-inner p{
color:#9db0c7;
font-size:18px;
margin-bottom:26px;
}

/* FOOTER */
footer{
padding:34px 0;
text-align:center;
color:#7f90a8;
font-size:14px;
border-top:1px solid rgba(255,255,255,.05);
}

/* RESPONSIVO */
@media(max-width:980px){
.hero h1{font-size:52px}
.metrics{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:640px){

.nav{
flex-direction:column;
gap:14px;
}

.nav-links{
justify-content:center;
}

.hero{
padding:70px 0 56px;
}

.hero h1{
font-size:40px;
}

.hero p{
font-size:20px;
}

.hero .sub{
font-size:16px;
}

.metrics{
grid-template-columns:1fr;
}

.section-title{
font-size:30px;
}

}
</style>

<header>
<div class="container nav">

<a href="index.html" class="logo">
<img src="jorge_logo.png" alt="JORGE Engine Logo">
<span>JORGE Engine</span>
</a>

<div class="nav-links">
<a href="#sobre">Sobre</a>
<a href="#verticais">Verticais</a>
<a href="#tecnologia">Tecnologia</a>
<a href="#contato">Contato</a>
<a href="https://github.com/gabrielhenriquegazola/Jorge-Engine" target="_blank">GitHub</a>
</div>

</div>
</header>
